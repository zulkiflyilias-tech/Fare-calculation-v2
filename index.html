<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rideshare MY - Expert v3.9</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --whatsapp: #25D366;
            --copy: #6b7280;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --gray-text: #6b7280;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .search-panel {
            background: var(--card-bg);
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 1001;
            border-bottom: 1px solid #e5e7eb;
        }

        .input-group {
            position: relative;
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            margin-bottom: 4px;
            color: var(--gray-text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input {
            width: 100%;
            padding: 12px 90px 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            background: #f9fafb;
            transition: all 0.2s ease;
        }

        input:focus { 
            border-color: var(--primary); 
            background: white; 
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
        }

        .btn-container {
            position: absolute;
            right: 8px;
            top: 24px;
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            z-index: 2000;
            max-height: 280px;
            overflow-y: auto;
            display: none;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin-top: 2px;
        }

        .autocomplete-item {
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
        }

        .loc-name { font-weight: 700; font-size: 14px; display: block; color: #111; }
        .loc-addr { font-size: 11px; color: var(--gray-text); }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        .swap-container {
            position: absolute;
            right: 24px;
            top: 76px;
            z-index: 1005;
        }

        .swap-btn {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .results-card {
            position: fixed;
            bottom: 24px;
            left: 16px;
            right: 16px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15);
            z-index: 1002;
            display: none;
        }

        #fare { font-size: 34px; font-weight: 800; color: var(--primary); margin: 0; }
        .mode-badge {
            background:#ecfdf5; 
            color:var(--primary); 
            padding:6px 12px; 
            border-radius:30px; 
            font-size:11px; 
            font-weight:700;
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
        .btn { 
            padding: 12px 4px; 
            border-radius: 10px; 
            text-align: center; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 12px;
            color: white; 
            border: none;
            cursor: pointer;
        }
        .btn-wa { background: var(--whatsapp); }
        .btn-nav { background: #3b82f6; }
        .btn-copy { background: var(--copy); }
        
        #loading-state { text-align: center; padding: 20px; color: var(--primary); }
    </style>
</head>
<body>

    <div class="search-panel">
        <div class="input-group">
            <label>Pickup Location</label>
            <input type="text" id="pickup" placeholder="Search for pickup..." autocomplete="off">
            <div class="btn-container">
                <button class="icon-btn" id="clear-pickup" style="display:none">✕</button>
                <button class="icon-btn" id="gps-trigger">📍</button>
            </div>
            <div id="pickup-results" class="autocomplete-list"></div>
        </div>

        <div class="swap-container">
            <button class="swap-btn" id="swap-btn">⇅</button>
        </div>

        <div class="input-group">
            <label>Destination</label>
            <input type="text" id="dropoff" placeholder="Search for destination..." autocomplete="off">
            <div class="btn-container">
                <button class="icon-btn" id="clear-dropoff" style="display:none">✕</button>
            </div>
            <div id="dropoff-results" class="autocomplete-list"></div>
        </div>

        <div class="input-group" style="margin-bottom: 0;">
            <label>Travel Schedule</label>
            <input type="datetime-local" id="departure-time">
        </div>
    </div>

    <div id="map"></div>

    <div id="results" class="results-card">
        <div id="loading-state">Calculating route...</div>
        <div id="fare-content" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="fare">RM 0</h2>
                <span id="mode-badge" class="mode-badge">Standard Rate</span>
            </div>
            <div style="margin: 10px 0; font-size:14px; color:#4b5563;">
                📏 <b id="distance">0 km</b> | ⏱️ <b id="eta">0 min</b>
            </div>
            <div class="btn-group">
                <a id="wa-btn" class="btn btn-wa" target="_blank">WhatsApp</a>
                <button id="copy-btn" class="btn btn-copy">Copy Text</button>
                <div id="nav-btn" class="btn btn-nav">Directions</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            WHATSAPP: "60108988182",
            ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
            CENTER: [4.2105, 101.9758] 
        };

        const $ = id => document.getElementById(id);
        let pickupCoord, dropoffCoord, routeLayer, pickupMarker, dropoffMarker, searchTimer;
        let lastSummaryText = "";

        const map = L.map("map", { zoomControl: false, attributionControl: false }).setView(CONFIG.CENTER, 6);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        $("departure-time").value = now.toISOString().slice(0,16);

        async function searchPlaces(query, resultId, type) {
            $(`clear-${type}`).style.display = query.length > 0 ? 'flex' : 'none';
            clearTimeout(searchTimer);
            if (query.length < 3) { 
                $(resultId).style.display = 'none'; 
                return; 
            }

            searchTimer = setTimeout(async () => {
                let bias = "";
                if (pickupCoord) {
                    bias = `&lat=${pickupCoord[0]}&lon=${pickupCoord[1]}&location_bias_scale=0.4`;
                }
                
                // Smart Tag Filtering to avoid incorrect school results for beaches/towns
                let tags = "";
                const q = query.toLowerCase();
                if (q.includes("pantai") || q.includes("beach") || q.includes("desaru") || q.includes("penawar")) {
                    tags = "&osm_tag=!amenity:school&osm_tag=natural:beach&osm_tag=tourism:attraction&osm_tag=leisure:resort&osm_tag=place:town";
                }

                const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&filter=countrycode:my${bias}${tags}&limit=8`;
                
                try {
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    // Fallback to general search if specific tags return nothing
                    if (data.features.length === 0 && tags !== "") {
                        const retryRes = await fetch(url.replace(tags, ""));
                        const retryData = await retryRes.json();
                        renderResults(retryData.features, resultId, type);
                    } else {
                        renderResults(data.features, resultId, type);
                    }
                } catch (e) {
                    console.error("Geocoding Error", e);
                }
            }, 400);
        }

        function renderResults(features, resultId, type) {
            const list = $(resultId);
            list.innerHTML = features.map(f => {
                const p = f.properties;
                const name = p.name || 'Unknown';
                const addr = [p.street, p.district, p.postcode, p.city, p.state].filter(Boolean).join(', ');
                const fullStr = `${name}, ${addr}`.replace(/'/g, "\\'");
                return `<div class="autocomplete-item" onclick="selectLoc('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${fullStr}')">
                    <span class="loc-name">${name}</span>
                    <span class="loc-addr">${addr || 'Malaysia'}</span>
                </div>`;
            }).join('');
            list.style.display = features.length ? 'block' : 'none';
        }

        function selectLoc(type, coord, label) {
            $(type).value = label;
            $(`${type}-results`).style.display = 'none';
            $(`clear-${type}`).style.display = 'flex';
            if (type === 'pickup') {
                if (pickupMarker) map.removeLayer(pickupMarker);
                pickupCoord = coord;
                pickupMarker = L.circleMarker(coord, {color: '#3b82f6', radius: 8}).addTo(map);
            } else {
                if (dropoffMarker) map.removeLayer(dropoffMarker);
                dropoffCoord = coord;
                dropoffMarker = L.circleMarker(coord, {color: '#ef4444', radius: 8}).addTo(map);
            }
            if (pickupCoord && dropoffCoord) calculate();
        }

        function clearInput(type) {
            $(type).value = '';
            $(`clear-${type}`).style.display = 'none';
            $(`${type}-results`).style.display = 'none';
            $("results").style.display = 'none';
            if (type === 'pickup') { if (pickupMarker) map.removeLayer(pickupMarker); pickupCoord = null; }
            else { if (dropoffMarker) map.removeLayer(dropoffMarker); dropoffCoord = null; }
            if (routeLayer) map.removeLayer(routeLayer);
        }

        async function calculate() {
            if (!pickupCoord || !dropoffCoord) return;
            
            $("results").style.display = 'block';
            $("fare-content").style.display = 'none';
            $("loading-state").style.display = 'block';

            try {
                const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                    body: JSON.stringify({ coordinates: [[pickupCoord[1], pickupCoord[0]], [dropoffCoord[1], dropoffCoord[0]]] })
                });
                const data = await res.json();
                
                if (!data.routes || data.routes.length === 0) throw new Error("No route found");

                const route = data.routes[0];
                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.polyline(decodePoly(route.geometry), { color: '#059669', weight: 6 }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [80, 80] });

                const km = route.summary.distance / 1000;
                const estMins = Math.ceil(route.summary.duration / 60);
                
                // Fare Logic
                const sched = new Date($("departure-time").value);
                const h = sched.getHours();
                const m = sched.getMinutes();
                const timeInMins = h * 60 + m;

                const isRushHour = (timeInMins >= 420 && timeInMins <= 570) || (timeInMins >= 1020 && timeInMins <= 1200);
                const isMidnight = (h >= 0 && h < 6);

                let ratePerKm = 1.25;
                let mode = "Standard Rate";

                if (km >= 80) {
                    ratePerKm = 1.80;
                    mode = "Long Distance Rate";
                } else if (isMidnight) {
                    ratePerKm = 1.25 * 1.5;
                    mode = "Midnight Rate";
                } else if (isRushHour) {
                    ratePerKm = 1.25 * 1.2;
                    mode = "Peak Hour Rate";
                }

                const baseFare = 3.00;
                let rawFare = baseFare + (km * ratePerKm);
                if (rawFare < 6.00) rawFare = 6.00;
                
                // Standard Rounding (e.g. 12.3 -> 12, 12.5 -> 13)
                const finalFare = Math.round(rawFare);

                $("fare").innerText = `RM ${finalFare}`;
                $("distance").innerText = `${km.toFixed(1)} km`;
                $("eta").innerText = `${estMins} min`;
                $("mode-badge").innerText = mode;
                
                lastSummaryText = `*Taxi Booking Request*\nMode: ${mode}\nFrom: ${$("pickup").value}\nTo: ${$("dropoff").value}\nEst. Distance: ${km.toFixed(1)} km\nEst. Time: ${estMins} min\nEst. Fare: RM ${finalFare}`;
                
                $("wa-btn").href = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(lastSummaryText)}`;
                $("nav-btn").onclick = () => window.location.href = `google.navigation:q=${dropoffCoord[0]},${dropoffCoord[1]}`;

                $("loading-state").style.display = 'none';
                $("fare-content").style.display = 'block';
            } catch (e) { 
                $("loading-state").innerText = "Route unavailable or calculation error."; 
            }
        }

        function decodePoly(str) {
            let index = 0, lat = 0, lng = 0, coordinates = [];
            while (index < str.length) {
                let b, shift = 0, result = 0;
                do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lat += (result & 1) ? ~(result >> 1) : (result >> 1);
                shift = 0; result = 0;
                do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lng += (result & 1) ? ~(result >> 1) : (result >> 1);
                coordinates.push([lat / 1e5, lng / 1e5]);
            }
            return coordinates;
        }

        $("pickup").oninput = e => searchPlaces(e.target.value, "pickup-results", "pickup");
        $("dropoff").oninput = e => searchPlaces(e.target.value, "dropoff-results", "dropoff");
        $("departure-time").onchange = () => { if(pickupCoord && dropoffCoord) calculate(); };
        $("clear-pickup").onclick = () => clearInput('pickup');
        $("clear-dropoff").onclick = () => clearInput('dropoff');

        $("copy-btn").onclick = () => {
            navigator.clipboard.writeText(lastSummaryText.replace(/\*/g, '')).then(() => {
                const btn = $("copy-btn");
                const oldText = btn.innerText;
                btn.innerText = "Copied!";
                btn.style.background = "#059669";
                setTimeout(() => { 
                    btn.innerText = oldText; 
                    btn.style.background = "var(--copy)";
                }, 2000);
            });
        };

        $("gps-trigger").onclick = () => {
            navigator.geolocation.getCurrentPosition(async p => {
                const lat = p.coords.latitude, lon = p.coords.longitude;
                try {
                    const res = await fetch(`https://photon.komoot.io/reverse?lon=${lon}&lat=${lat}`);
                    const data = await res.json();
                    const feat = data.features[0].properties;
                    const addr = [feat.name, feat.street, feat.district, feat.city].filter(Boolean).join(', ');
                    selectLoc('pickup', [lat, lon], addr || "Current Location");
                } catch (e) { selectLoc('pickup', [lat, lon], "Current Location"); }
            });
        };

        $("swap-btn").onclick = () => {
            const v1 = $("pickup").value, v2 = $("dropoff").value;
            const c1 = pickupCoord, c2 = dropoffCoord;
            const m1 = pickupMarker, m2 = dropoffMarker;
            $("pickup").value = v2; $("dropoff").value = v1;
            pickupCoord = c2; dropoffCoord = c1;
            pickupMarker = m2; dropoffMarker = m1;
            if(pickupMarker) pickupMarker.setStyle({color: '#3b82f6'});
            if(dropoffMarker) dropoffMarker.setStyle({color: '#ef4444'});
            $(`clear-pickup`).style.display = $("pickup").value ? 'flex' : 'none';
            $(`clear-dropoff`).style.display = $("dropoff").value ? 'flex' : 'none';
            if (pickupCoord && dropoffCoord) calculate();
        };
    </script>
</body>
</html>
