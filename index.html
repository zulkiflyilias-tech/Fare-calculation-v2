<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novelty Resources | Premium Fare Tool</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --bg: #f8fafc;
            --card: #ffffff;
            --whatsapp: #25D366;
            --text-main: #1e293b;
            --accent: #fbbf24;
        }

        body { margin: 0; display: flex; height: 100vh; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text-main); }
        #map { flex: 1; z-index: 1; }
        
        #sidebar {
            width: 400px; padding: 32px 24px; background: var(--card);
            box-shadow: 10px 0 30px rgba(0,0,0,0.05); display: flex; flex-direction: column; z-index: 1000;
            overflow-y: auto;
        }

        .header { margin-bottom: 28px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 1.8rem; letter-spacing: -1px; font-weight: 800; }
        .header p { margin: 4px 0 0; font-size: 0.9rem; color: #64748b; }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; color: #94a3b8; letter-spacing: 1px; }
        
        .search-wrapper { position: relative; display: flex; align-items: center; }
        input {
            width: 100%; box-sizing: border-box; padding: 14px 16px; border: 2px solid #f1f5f9;
            border-radius: 12px; font-size: 15px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fdfdfd;
        }
        input:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }

        .gps-btn {
            position: absolute; right: 10px; background: white; border: none; cursor: pointer;
            color: var(--primary); padding: 6px; display: flex; align-items: center; border-radius: 8px;
        }
        .gps-btn:hover { background: #f1f5f9; }
        .gps-btn.loading { animation: spin 1s infinite linear; opacity: 0.6; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .autocomplete-results {
            position: absolute; width: 100%; background: white; border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15); display: none; z-index: 2000; margin-top: 8px; 
            border: 1px solid #e2e8f0; max-height: 280px; overflow-y: auto;
        }
        .autocomplete-item { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #f8fafc; transition: background 0.2s; }
        .autocomplete-item:hover { background: #f0fdf4; }
        .place-name { font-weight: 700; font-size: 0.95rem; display: block; color: var(--text-main); }
        .place-address { font-size: 0.8rem; color: #64748b; display: block; margin-top: 2px; }

        #results {
            margin-top: auto; padding: 24px; border-radius: 20px; background: #1e293b;
            color: white; display: none; animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .fare-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #fare { font-size: 2.2rem; font-weight: 900; color: #fff; }
        #eta { color: #4ade80; font-weight: 700; font-size: 1.1rem; }
        
        .stats { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #94a3b8; margin-bottom: 16px; }
        #surge-label { color: var(--accent); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; 
            padding: 16px; border-radius: 14px; background: var(--whatsapp); color: white; 
            text-decoration: none; font-weight: 700; transition: transform 0.2s, filter 0.2s;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        @media(max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; box-sizing: border-box; }
            #map { height: 40vh; width: 100%; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2>Novelty Resources</h2>
        <p>Premium Fare Estimation Tool</p>
    </div>

    <div class="input-group">
        <label>Scheduled Departure</label>
        <input type="datetime-local" id="departure-time">
    </div>

    <div class="input-group">
        <label>Pickup Location</label>
        <div class="search-wrapper">
            <input id="pickup" placeholder="Search pickup..." autocomplete="off">
            <button id="gps-trigger" class="gps-btn" title="Use current location">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </button>
        </div>
        <div id="pickup-results" class="autocomplete-results"></div>
    </div>

    <div class="input-group">
        <label>Dropoff Location</label>
        <div class="search-wrapper">
            <input id="dropoff" placeholder="Search destination..." autocomplete="off">
        </div>
        <div id="dropoff-results" class="autocomplete-results"></div>
    </div>

    <div id="results">
        <div class="fare-row">
            <div id="fare">RM 0</div>
            <div id="eta">--</div>
        </div>
        <div class="stats">
            <span id="distance">0 km</span>
            <span>•</span>
            <span id="surge-label">Standard Rate</span>
        </div>
        <a id="wa" class="btn" target="_blank">
            <span>Send to WhatsApp</span>
        </a>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const CONFIG = {
        WHATSAPP: "60108988182",
        // NOTE: In production, move this to a backend proxy to keep it hidden
        ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
        CENTER: [3.139, 101.686],
        BBOX: "99.5,1.2,103.6,6.8",
        TRAFFIC_MULTIPLIER: 1.25 
    };

    const FARE_ENGINE = {
        BASE: 5.00,
        TIERS: [
            { upTo: 80,  rate: 1.25, timeRate: 0.45 }, 
            { upTo: 150, rate: 1.50, timeRate: 0.50 }, 
            { upTo: Infinity, rate: 2.00, timeRate: 0.60 } 
        ]
    };

    const $ = id => document.getElementById(id);
    let pickupCoord, dropoffCoord, routeLayer, pickupMarker, dropoffMarker, timer;

    // Initialize Map
    const map = L.map("map", { zoomControl: false }).setView(CONFIG.CENTER, 13);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    window.onload = () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        $("departure-time").value = now.toISOString().slice(0, 16);
        $("departure-time").min = now.toISOString().slice(0, 16); // Prevent past bookings
    };

    // Helper: Format minutes to "X hr Y min"
    function formatDuration(totalMins) {
        const roundedMins = Math.round(totalMins);
        const h = Math.floor(roundedMins / 60);
        const m = roundedMins % 60;
        return h > 0 ? `${h} hr ${m} min` : `${m} min`;
    }

    async function search(val, resultId, type) {
        clearTimeout(timer);
        if (val.length < 3) { $(resultId).style.display = 'none'; return; }
        
        timer = setTimeout(async () => {
            try {
                const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&bbox=${CONFIG.BBOX}&limit=6`);
                const data = await res.json();
                renderResults(data.features, resultId, type);
            } catch (e) { console.error("Search failed"); }
        }, 300);
    }

    function renderResults(features, resultId, type) {
        const list = $(resultId);
        list.innerHTML = features.map(f => {
            const p = f.properties;
            const name = p.name || p.street || 'Selected Location';
            const address = [p.street, p.district, p.city, p.state].filter(Boolean).join(', ');
            const fullLabel = [name, address].filter(Boolean).join(', ');
            
            return `
                <div class="autocomplete-item" onclick="selectLocation('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${fullLabel.replace(/'/g, "\\'")}')">
                    <span class="place-name">${name}</span>
                    <span class="place-address">${address}</span>
                </div>
            `;
        }).join('');
        list.style.display = features.length ? 'block' : 'none';
    }

    function selectLocation(type, coord, label) {
        $(type).value = label;
        $(`${type}-results`).style.display = 'none';
        
        const markerOptions = type === 'pickup' 
            ? { radius: 10, fillColor: '#059669', color: '#fff', weight: 3, fillOpacity: 1 }
            : { radius: 10, fillColor: '#1e293b', color: '#fff', weight: 3, fillOpacity: 1 };

        if (type === 'pickup') {
            pickupCoord = coord;
            if (pickupMarker) map.removeLayer(pickupMarker);
            pickupMarker = L.circleMarker(coord, markerOptions).addTo(map);
        } else {
            dropoffCoord = coord;
            if (dropoffMarker) map.removeLayer(dropoffMarker);
            dropoffMarker = L.circleMarker(coord, markerOptions).addTo(map);
        }
        
        if (pickupCoord && dropoffCoord) calculateRoute();
        else map.setView(coord, 15);
    }

    async function calculateRoute() {
        try {
            const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                body: JSON.stringify({ 
                    coordinates: [[pickupCoord[1], pickupCoord[0]], [dropoffCoord[1], dropoffCoord[0]]] 
                })
            });
            const data = await res.json();
            if (!data.routes) throw new Error();
            const route = data.routes[0];
            
            if (routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.polyline(decodePoly(route.geometry), { color: '#059669', weight: 6, opacity: 0.8 }).addTo(map);
            map.fitBounds(routeLayer.getBounds(), { padding: [80, 80] });

            processFare(route.summary.distance / 1000, (route.summary.duration / 60) * CONFIG.TRAFFIC_MULTIPLIER);
        } catch (e) { alert("Route calculation failed. Please check your locations."); }
    }

    function processFare(km, mins) {
        let distCost = 0;
        let remaining = km;
        let lastLimit = 0;
        let activeMinuteRate = 0.45;

        for (const tier of FARE_ENGINE.TIERS) {
            if (remaining <= 0) break;
            let currentSegment = Math.min(remaining, tier.upTo - lastLimit);
            distCost += currentSegment * tier.rate;
            if (km > lastLimit) activeMinuteRate = tier.timeRate;
            remaining -= currentSegment;
            lastLimit = tier.upTo;
        }

        let baseTotal = FARE_ENGINE.BASE + distCost + (mins * activeMinuteRate);
        const depTime = new Date($("departure-time").value);
        const hour = depTime.getHours() + (depTime.getMinutes() / 60);
        let multiplier = 1.0;
        let label = "Standard Rate";

        if (hour >= 0 && hour < 6) {
            multiplier = 1.5; label = "Midnight Surcharge (+50%)";
        } else if ((hour >= 7 && hour <= 9.5) || (hour >= 17 && hour <= 20)) {
            multiplier = 1.2; label = "Peak Hour Surge (+20%)";
        }

        const finalTotal = Math.ceil(baseTotal * multiplier);
        const timeStr = formatDuration(mins);

        $("results").style.display = 'block';
        $("fare").innerText = `RM ${finalTotal}`;
        $("distance").innerText = `${km.toFixed(1)} km`;
        $("eta").innerText = timeStr;
        $("surge-label").innerText = label;

        const msg = `*New Booking Request*\n\n*Departure:* ${depTime.toLocaleString()}\n*From:* ${$("pickup").value}\n*To:* ${$("dropoff").value}\n\n*Distance:* ${km.toFixed(1)}km\n*Travel Time:* ~${timeStr}\n*Estimated Fare:* RM ${finalTotal}\n\n*Rate:* ${label}`;
        $("wa").href = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`;
    }

    function decodePoly(str) {
        let index = 0, lat = 0, lng = 0, coordinates = [];
        while (index < str.length) {
            let b, shift = 0, result = 0;
            do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
            lat += ((result & 1) ? ~(result >> 1) : (result >> 1));
            shift = 0; result = 0;
            do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
            lng += ((result & 1) ? ~(result >> 1) : (result >> 1));
            coordinates.push([lat / 1e5, lng / 1e5]);
        }
        return coordinates;
    }

    // Event Listeners
    $("pickup").oninput = e => search(e.target.value, "pickup-results", "pickup");
    $("dropoff").oninput = e => search(e.target.value, "dropoff-results", "dropoff");
    $("departure-time").onchange = () => { if (pickupCoord && dropoffCoord) calculateRoute(); };
    
    $("gps-trigger").onclick = () => {
        const btn = $("gps-trigger");
        btn.classList.add('loading');
        
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude: lat, longitude: lon } = pos.coords;
            try {
                const res = await fetch(`https://photon.komoot.io/reverse?lon=${lon}&lat=${lat}`);
                const data = await res.json();
                const p = data.features[0].properties;
                const fullAddress = [p.name, p.street, p.district, p.city].filter(Boolean).join(', ');
                selectLocation('pickup', [lat, lon], fullAddress || `Current Location (${lat.toFixed(4)})`);
            } catch (e) {
                selectLocation('pickup', [lat, lon], "Current Location");
            }
            btn.classList.remove('loading');
        }, () => {
            alert("Location access denied.");
            btn.classList.remove('loading');
        });
    };

    document.addEventListener('click', e => {
        if (!e.target.closest('.input-group')) {
            document.querySelectorAll('.autocomplete-results').forEach(el => el.style.display = 'none');
        }
    });
</script>
</body>
</html>
