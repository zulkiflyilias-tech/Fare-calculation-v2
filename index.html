<script>
const CONFIG = {
    WHATSAPP: "60108988182",
    ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
    CENTER: [3.139, 101.686],
    BBOX: "99.5,1.2,103.6,6.8"
};

const TARIFF = {
    BASE_KM: 1.25,
    BASE_MIN: 0.43,
    LONG_KM: 1.80,
    THRESHOLD: 50,
    PEAK_SURCHARGE: 0.45
};

const $ = id => document.getElementById(id);

// STATE
let pickupCoord = null;
let dropoffCoord = null;
let markers = { pickup: null, dropoff: null };
let routeLayer = null;
let searchTimer = null;

// MAP
const map = L.map("map", { zoomControl: false }).setView(CONFIG.CENTER, 13);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png")
.addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// INIT
window.onload = () => {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    $("departure-time").value = now.toISOString().slice(0, 16);
};

// UI STATE
function setLoading(state) {
    $("results").style.display = 'block';
    $("loading-state").style.display = state ? 'block' : 'none';
    $("fare-content").style.display = state ? 'none' : 'block';
}

// SEARCH
function searchPlaces(query, resultId, type) {
    clearTimeout(searchTimer);

    if (query.length < 3) {
        $(resultId).style.display = 'none';
        return;
    }

    searchTimer = setTimeout(async () => {
        try {
            const res = await fetch(
                `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&bbox=${CONFIG.BBOX}&limit=5`
            );
            const data = await res.json();
            renderResults(data.features, resultId, type);
        } catch (err) {
            console.error("Search error:", err);
        }
    }, 400);
}

function renderResults(features, resultId, type) {
    const list = $(resultId);

    list.innerHTML = features.map(f => {
        const p = f.properties;
        const label = `${p.name || ''}, ${p.city || ''}`.replace(/, $/, "");

        return `
        <div class="autocomplete-item"
            onclick="selectLocation('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${label.replace(/'/g, "\\'")}')">
            <span class="place-name">${p.name || 'Unknown'}</span>
            <span class="place-address">${p.city || ''} ${p.state || ''}</span>
        </div>`;
    }).join('');

    list.style.display = features.length ? 'block' : 'none';
}

// LOCATION
function setMarker(type, coord) {
    if (markers[type]) map.removeLayer(markers[type]);
    markers[type] = L.marker(coord).addTo(map);

    if (type === 'pickup') pickupCoord = coord;
    else dropoffCoord = coord;
}

function selectLocation(type, coord, label) {
    $(type).value = label;
    $(`${type}-results`).style.display = 'none';

    setMarker(type, coord);

    if (pickupCoord && dropoffCoord) calculateRoute();
}

// ROUTING
async function calculateRoute() {
    setLoading(true);

    try {
        const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": CONFIG.ORS_KEY
            },
            body: JSON.stringify({
                coordinates: [
                    [pickupCoord[1], pickupCoord[0]],
                    [dropoffCoord[1], dropoffCoord[0]]
                ]
            })
        });

        const data = await res.json();
        if (!data.routes?.length) throw new Error("No route");

        const route = data.routes[0];

        drawRoute(route);

        const km = route.summary.distance / 1000;
        const mins = route.summary.duration / 60;
        const hour = new Date($("departure-time").value).getHours();

        const result = calculateFare(km, mins, hour);

        updateUI(result.fare, km, mins, result.mode, result.isPeak);

        setLoading(false);

    } catch (err) {
        console.error(err);
        alert("Route calculation failed.");
        $("results").style.display = 'none';
    }
}

function drawRoute(route) {
    if (routeLayer) map.removeLayer(routeLayer);

    routeLayer = L.polyline(decodePoly(route.geometry), {
        color: '#059669',
        weight: 5
    }).addTo(map);

    map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
}

// FARE ENGINE (DISTANCE-WEIGHTED)
function isPeakHour(hour) {
    return (hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 19);
}

function calculateFare(km, mins, hour) {
    let fare;

    if (km <= TARIFF.THRESHOLD) {
        fare = (km * TARIFF.BASE_KM) + (mins * TARIFF.BASE_MIN);
    } else {
        const ratio = TARIFF.THRESHOLD / km;
        const minsBase = mins * ratio;

        const baseFare =
            (TARIFF.THRESHOLD * TARIFF.BASE_KM) +
            (minsBase * TARIFF.BASE_MIN);

        const extraKm = km - TARIFF.THRESHOLD;
        const longFare = extraKm * TARIFF.LONG_KM;

        fare = baseFare + longFare;
    }

    const isPeak = isPeakHour(hour);

    if (isPeak) {
        fare += mins * TARIFF.PEAK_SURCHARGE;
    }

    if (hour >= 0 && hour < 6) {
        fare *= 1.5;
    }

    return {
        fare: Math.ceil(fare),
        isPeak,
        mode: km > TARIFF.THRESHOLD
            ? "Long Haul"
            : isPeak ? "Peak Hour" : "Standard Rate"
    };
}

// PROFIT ENGINE
function calculateProfit(fare, km) {
    const fuelPerKm = parseFloat($("fuel-cost")?.value) || 0;
    const fuelTotal = km * fuelPerKm;
    const profit = fare - fuelTotal;

    return { fuelTotal, profit };
}

// UI UPDATE
function updateUI(fare, km, mins, mode, isPeak) {
    $("fare").innerText = `RM ${fare}`;
    $("fare").classList.toggle("is-peak", isPeak);

    $("distance").innerText = `${km.toFixed(1)} km`;
    $("eta").innerText = `${Math.round(mins)} min`;
    $("mode-badge").innerText = mode;

    // PROFIT
    const { fuelTotal, profit } = calculateProfit(fare, km);

    if ($("fuel-total")) $("fuel-total").innerText = `RM ${fuelTotal.toFixed(2)}`;

    const profitEl = $("profit");
    if (profitEl) {
        profitEl.innerText = `RM ${profit.toFixed(2)}`;
        profitEl.style.color =
            profit > 0 ? "#059669" :
            profit < 0 ? "#dc2626" : "#6b7280";
    }

    // LINKS
    const mapsUrl =
        `https://www.google.com/maps/dir/?api=1&origin=${pickupCoord[0]},${pickupCoord[1]}&destination=${dropoffCoord[0]},${dropoffCoord[1]}&travelmode=driving`;

    $("nav-btn").href = mapsUrl;

    const msg =
`*New Ride Booking*

From: ${$("pickup").value}
To: ${$("dropoff").value}

Dist: ${km.toFixed(1)} km
Est Time: ${Math.round(mins)} min
Fare: RM ${fare}
Fuel: RM ${fuelTotal.toFixed(2)}
Profit: RM ${profit.toFixed(2)}
Status: ${mode}

Navigation: ${mapsUrl}`;

    $("wa-btn").href =
        `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`;
}

// UTIL
function decodePoly(str) {
    let index = 0, lat = 0, lng = 0, coordinates = [];

    while (index < str.length) {
        let b, shift = 0, result = 0;

        do {
            b = str.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);

        lat += (result & 1) ? ~(result >> 1) : (result >> 1);

        shift = 0;
        result = 0;

        do {
            b = str.charCodeAt(index++) - 63;
            result |= (b & 0x1f) << shift;
            shift += 5;
        } while (b >= 0x20);

        lng += (result & 1) ? ~(result >> 1) : (result >> 1);

        coordinates.push([lat / 1e5, lng / 1e5]);
    }

    return coordinates;
}

// EVENTS
$("pickup").oninput = e =>
    searchPlaces(e.target.value, "pickup-results", "pickup");

$("dropoff").oninput = e =>
    searchPlaces(e.target.value, "dropoff-results", "dropoff");

$("gps-trigger").onclick = () => {
    navigator.geolocation.getCurrentPosition(pos => {
        const coord = [pos.coords.latitude, pos.coords.longitude];
        selectLocation('pickup', coord, "My Location");
        map.setView(coord, 15);
    }, () => alert("GPS denied"));
};

if ($("fuel-cost")) {
    $("fuel-cost").oninput = () => {
        if (pickupCoord && dropoffCoord) calculateRoute();
    };
}
</script>
