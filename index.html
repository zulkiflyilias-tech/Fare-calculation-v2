<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rideshare MY - Pro v3.9.7</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #059669; --whatsapp: #25D366; --bg: #f3f4f6; --text: #1f2937; --gray: #6b7280; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .app-header { background: #fff; padding: 12px 16px; display: flex; align-items: center; border-bottom: 1px solid #e5e7eb; z-index: 110; }
        .app-header h1 { margin: 0; font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .version-pill { margin-left: 8px; font-size: 10px; background: #ecfdf5; padding: 2px 8px; border-radius: 10px; color: var(--primary); font-weight: 700; }
        
        .search-panel { background: #fff; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); z-index: 100; }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; margin-bottom: 4px; color: var(--gray); text-transform: uppercase; }
        
        input { width: 100%; padding: 14px 95px 14px 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; background: #f9fafb; }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
        
        .btn-container { position: absolute; right: 8px; top: 22px; display: flex; align-items: center; height: 48px; }
        .icon-btn { background: transparent; border: none; cursor: pointer; padding: 8px; color: var(--gray); font-size: 18px; }
        
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; z-index: 200; max-height: 280px; overflow-y: auto; display: none; border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid #e5e7eb; }
        .autocomplete-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
        .loc-name { font-weight: 700; font-size: 14px; color: var(--text); display: block; }
        .loc-addr { font-size: 11px; color: var(--gray); line-height: 1.4; display: block; margin-top: 2px; }

        #map { flex-grow: 1; z-index: 1; }
        .swap-container { position: absolute; right: 24px; top: 92px; z-index: 105; }
        .swap-btn { background: #fff; border: 1px solid #e5e7eb; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; color: var(--primary); }

        .results-card { position: fixed; bottom: 24px; left: 16px; right: 16px; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 300; display: none; }
        #fare { font-size: 32px; font-weight: 800; color: var(--primary); margin: 0; }
        .mode-badge { background:#ecfdf5; color:var(--primary); padding:4px 12px; border-radius:20px; font-size: 10px; font-weight:700; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .btn { padding: 14px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 700; font-size: 14px; color: #fff; display: flex; align-items: center; justify-content: center; }
        .btn-wa { background: var(--whatsapp); }
        .btn-nav { background: #3b82f6; }
        
        .loader-box { text-align: center; padding: 10px; }
        .loader { width: 24px; height: 24px; border: 3px solid #ecfdf5; border-bottom-color: var(--primary); border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>RIDESHARE MY</h1>
        <span class="version-pill">PRO v3.9.7</span>
    </header>

    <div class="search-panel">
        <div class="input-group">
            <label>Pickup Point</label>
            <input type="text" id="pickup" placeholder="Search address or building..." autocomplete="off">
            <div class="btn-container">
                <button class="icon-btn" onclick="clearInput('pickup')">✕</button>
                <button class="icon-btn" id="gps-trigger">📍</button>
            </div>
            <div id="pickup-results" class="autocomplete-list"></div>
        </div>

        <div class="swap-container"><button class="swap-btn" id="swap-btn">⇅</button></div>

        <div class="input-group">
            <label>Drop-off Point</label>
            <input type="text" id="dropoff" placeholder="Destination..." autocomplete="off">
            <div class="btn-container"><button class="icon-btn" onclick="clearInput('dropoff')">✕</button></div>
            <div id="dropoff-results" class="autocomplete-list"></div>
        </div>

        <div class="input-group" style="margin:0">
            <label>Departure Time</label>
            <input type="datetime-local" id="departure-time">
        </div>
    </div>

    <div id="map"></div>

    <div id="results" class="results-card">
        <div id="loading-state" class="loader-box">
            <span class="loader"></span>
            <p style="margin:8px 0 0; font-size:13px; color:var(--gray)">Searching navigable road...</p>
        </div>
        <div id="fare-content" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h2 id="fare">RM 0</h2>
                <span id="mode-badge" class="mode-badge">Standard</span>
            </div>
            <div style="display:flex; gap:15px; font-size:13px; color: var(--gray); background: #f9fafb; padding: 10px; border-radius: 10px;">
                <span>📏 <b><span id="distance">0 km</span></b></span>
                <span>⏱️ <b><span id="eta">0 min</span></b></span>
            </div>
            <div class="btn-group">
                <a id="wa-btn" class="btn btn-wa" target="_blank">Book WhatsApp</a>
                <a id="nav-btn" class="btn btn-nav" target="_blank">Navigate</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            WHATSAPP: "60108988182",
            ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
            BASE_RATE: 1.25,
            MIN_FARE: 8,
            CENTER: [3.139, 101.686]
        };

        const $ = id => document.getElementById(id);
        let coords = { pickup: null, dropoff: null };
        let markers = { pickup: null, dropoff: null };
        let routeLayer, searchTimer;

        const map = L.map("map", { zoomControl: false, attributionControl: false }).setView(CONFIG.CENTER, 13);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        $("departure-time").value = now.toISOString().slice(0,16);

        function clearInput(type) {
            $(type).value = "";
            coords[type] = null;
            if (markers[type]) map.removeLayer(markers[type]);
            if (routeLayer) map.removeLayer(routeLayer);
            $(`${type}-results`).style.display = 'none';
            $("results").style.display = 'none';
        }

        async function search(query, type) {
            if (query.length < 3) return $(`${type}-results`).style.display = 'none';
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query + " Malaysia")}&limit=6`);
                    const data = await res.json();
                    renderResults(data.features, type);
                } catch (e) { console.error("API Error"); }
            }, 350);
        }

        function renderResults(features, type) {
            const list = $(`${type}-results`);
            list.innerHTML = features.map(f => {
                const p = f.properties;
                const name = p.name || p.street || 'Point';
                const street = p.street || '';
                const district = p.district || p.suburb || '';
                const city = p.city || '';
                const post = p.postcode || '';
                
                const fullLabel = `${name}, ${street} ${district}, ${post} ${city}`.replace(/ ,/g, '').replace(/,,/g, ',').trim();

                return `<div class="autocomplete-item" onclick="select('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${fullLabel.replace(/'/g, "\\'")}')">
                    <span class="loc-name">${name}</span>
                    <span class="loc-addr">${street} ${district}<br>${post} ${city}</span>
                </div>`;
            }).join('');
            list.style.display = features.length ? 'block' : 'none';
        }

        function select(type, latlng, label) {
            $(type).value = label;
            $(`${type}-results`).style.display = 'none';
            coords[type] = latlng;
            if (markers[type]) map.removeLayer(markers[type]);
            markers[type] = L.circleMarker(latlng, { color: type === 'pickup' ? '#3b82f6' : '#ef4444', fillOpacity: 1, radius: 7 }).addTo(map);
            if (coords.pickup && coords.dropoff) calculate(); else map.setView(latlng, 16);
        }

        $("gps-trigger").onclick = () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    try {
                        const res = await fetch(`https://photon.komoot.io/reverse?lat=${pos[0]}&lon=${pos[1]}`);
                        const data = await res.json();
                        const p = data.features[0].properties;
                        const full = `${p.name || ''}, ${p.street || ''}, ${p.postcode || ''} ${p.city || ''}`.trim().replace(/^,/, '');
                        select('pickup', pos, full);
                    } catch (e) { select('pickup', pos, "Current Location"); }
                });
            }
        };

        async function calculate() {
            $("results").style.display = 'block';
            $("fare-content").style.display = 'none';
            $("loading-state").style.display = 'block';

            try {
                const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                    body: JSON.stringify({ 
                        coordinates: [[coords.pickup[1], coords.pickup[0]], [coords.dropoff[1], coords.dropoff[0]]],
                        radiuses: [350, 350], // Snap to road within 350m
                        preference: 'recommended'
                    })
                });
                
                const data = await res.json();
                if (!data.routes) throw new Error();
                
                const route = data.routes[0];
                const km = route.summary.distance / 1000;
                const mins = Math.max(1, Math.round(route.summary.duration / 60));

                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.polyline(route.geometry.coordinates.map(c => [c[1], c[0]]), { color: '#059669', weight: 6 }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [60, 60] });

                const time = new Date($("departure-time").value);
                const hhmm = time.getHours() * 100 + time.getMinutes();
                let fare = 0, mode = "Standard";

                if (km >= 80) {
                    fare = (km * 1.90) + (mins * 0.20); mode = "Long Journey";
                } else if (hhmm >= 0 && hhmm <= 559) {
                    fare = (km * CONFIG.BASE_RATE * 1.5) + (mins * 0.40); mode = "Night Rate";
                } else if ((hhmm >= 600 && hhmm <= 859) || (hhmm >= 1700 && hhmm <= 1959)) {
                    fare = (km * CONFIG.BASE_RATE * 1.2) + (mins * 0.40); mode = "Peak Hour";
                } else {
                    fare = km * CONFIG.BASE_RATE; mode = "Standard";
                }

                const final = Math.max(CONFIG.MIN_FARE, Math.ceil(fare));
                $("fare").innerText = `RM ${final}`;
                $("distance").innerText = `${km.toFixed(1)} km`;
                $("eta").innerText = `${mins} min`;
                $("mode-badge").innerText = mode;

                $("wa-btn").href = `https://wa.me/${CONFIG.WHATSAPP}?text=` + encodeURIComponent(`*NEW BOOKING*\nMode: ${mode}\nFrom: ${$("pickup").value}\nTo: ${$("dropoff").value}\nFare: RM ${final}\nDist: ${km.toFixed(1)}km`);
                $("nav-btn").href = `https://www.google.com/maps/dir/?api=1&origin=${coords.pickup[0]},${coords.pickup[1]}&destination=${coords.dropoff[0]},${coords.dropoff[1]}&travelmode=driving`;

                $("loading-state").style.display = 'none';
                $("fare-content").style.display = 'block';
            } catch (e) { 
                $("loading-state").innerHTML = "<p style='color:#ef4444'>Road access not found. Try moving the pin.</p>"; 
            }
        }

        $("pickup").oninput = e => search(e.target.value, 'pickup');
        $("dropoff").oninput = e => search(e.target.value, 'dropoff');
        $("swap-btn").onclick = () => {
            const tV = $("pickup").value, tC = coords.pickup;
            $("pickup").value = $("dropoff").value; coords.pickup = coords.dropoff;
            $("dropoff").value = tV; coords.dropoff = tC;
            if (coords.pickup && coords.dropoff) calculate();
        };
        document.addEventListener('click', e => { if (!e.target.closest('.input-group')) document.querySelectorAll('.autocomplete-list').forEach(l => l.style.display = 'none'); });
    </script>
</body>
</html>
