ló</head>
<body>

    <div class="search-panel">
        <div class="input-group">
            <label>PICKUP</label>
            <input type="text" id="pickup" placeholder="Search pickup..." autocomplete="off">
            <button class="gps-btn" id="gps-trigger">📍</button>
            <div id="pickup-results" class="autocomplete-list"></div>
        </div>

        <div class="input-group">
            <label>DROPOFF</label>
            <input type="text" id="dropoff" placeholder="Search destination..." autocomplete="off">
            <div id="dropoff-results" class="autocomplete-list"></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 2;">
                <label>DEPARTURE TIME</label>
                <input type="datetime-local" id="departure-time">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>PRESETS</label>
                <select onchange="loadPreset(this.value)">
                    <option value="">Select...</option>
                    <option value="klia">KLIA</option>
                    <option value="genting">Genting</option>
                    <option value="jb">JB</option>
                </select>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="results" class="results-card">
        <div id="loading-state">Calculating...</div>
        <div id="fare-content" style="display:none;">
            <div class="fare-header">
                <h2 id="fare">RM 0</h2>
                <span id="mode-badge">Taxi Meter</span>
            </div>
            
            <div class="stats-row">
                <div>📏 Distance: <span id="distance">0 km</span></div>
                <div>⏱️ Est. Time: <span id="eta">0 min</span></div>
            </div>

            <div class="btn-group">
                <a id="wa-btn" class="btn btn-wa" target="_blank">WhatsApp Book</a>
                <a id="nav-btn" class="btn btn-nav" target="_blank">Open Maps</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            WHATSAPP: "60108988182",
            ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
            CENTER: [3.139, 101.686],
            BBOX: "99.5,1.2,103.6,6.8"
        };

        const FARE = {
            TAXI: { FLAG: 3.00, INCLUDED_KM: 1.0, PER_200M: 0.25, PER_36SEC: 0.25 },
            PRIVATE: { BASE: 10, PER_KM: 2.2 },
            SWITCH_KM: 30
        };

        const PRESETS = {
            klia: { name: "KLIA T1", coord: [2.7456, 101.7072] },
            genting: { name: "Genting Highlands", coord: [3.4230, 101.7930] },
            jb: { name: "Johor Bahru", coord: [1.4927, 103.7414] }
        };

        const $ = id => document.getElementById(id);
        let pickupCoord, dropoffCoord, routeLayer, pickupMarker, dropoffMarker, searchTimer;

        const map = L.map("map", { zoomControl: false }).setView(CONFIG.CENTER, 13);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        window.onload = () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            $("departure-time").value = now.toISOString().slice(0, 16);
        };

        async function searchPlaces(query, resultId, type) {
            clearTimeout(searchTimer);
            if (query.length < 3) return $(resultId).style.display = 'none';

            searchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&bbox=${CONFIG.BBOX}&limit=5`);
                    const data = await res.json();
                    renderResults(data.features, resultId, type);
                } catch (e) { console.error("Search error", e); }
            }, 400);
        }

        function renderResults(features, resultId, type) {
            const list = $(resultId);
            list.innerHTML = features.map(f => {
                const p = f.properties;
                const label = `${p.name || ''}, ${p.city || ''}`.replace(/, $/, "");
                return `
                    <div class="autocomplete-item" onclick="selectLocation('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${label.replace(/'/g, "\\'")}')">
                        <span class="place-name">${p.name || 'Unknown'}</span>
                        <span class="place-address">${p.city || ''} ${p.state || ''}</span>
                    </div>`;
            }).join('');
            list.style.display = features.length ? 'block' : 'none';
        }

        function selectLocation(type, coord, label) {
            $(type).value = label;
            $(`${type}-results`).style.display = 'none';

            if (type === 'pickup') {
                pickupCoord = coord;
                if (pickupMarker) map.removeLayer(pickupMarker);
                pickupMarker = L.marker(coord).addTo(map);
            } else {
                dropoffCoord = coord;
                if (dropoffMarker) map.removeLayer(dropoffMarker);
                dropoffMarker = L.marker(coord).addTo(map);
            }

            if (pickupCoord && dropoffCoord) calculateRoute();
        }

        async function calculateRoute() {
            $("results").style.display = 'block';
            $("fare-content").style.display = 'none';
            $("loading-state").style.display = 'block';

            try {
                const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                    body: JSON.stringify({ coordinates: [[pickupCoord[1], pickupCoord[0]], [dropoffCoord[1], dropoffCoord[0]]] })
                });

                const data = await res.json();
                const route = data.routes[0];

                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.polyline(decodePoly(route.geometry), { color: '#059669', weight: 5 }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });

                const km = route.summary.distance / 1000;
                const baseMins = route.summary.duration / 60;
                
                const depDate = new Date($("departure-time").value);
                const hour = depDate.getHours();
                const multiplier = (hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 19) ? 1.5 : 1.2;
                const totalMins = baseMins * multiplier;

                processFare(km, totalMins, hour);

                $("loading-state").style.display = 'none';
                $("fare-content").style.display = 'block';
            } catch (e) {
                alert("Routing failed. Please check your connection.");
                $("results").style.display = 'none';
            }
        }

        function processFare(km, mins, hour) {
            let fare = 0;
            let mode = (km <= FARE.SWITCH_KM) ? "Taxi Meter" : "Private Hire";

            if (mode === "Taxi Meter") {
                fare = FARE.TAXI.FLAG;
                if (km > FARE.TAXI.INCLUDED_KM) {
                    fare += Math.ceil((km - FARE.TAXI.INCLUDED_KM) * 1000 / 200) * FARE.TAXI.PER_200M;
                }
                fare += Math.floor((mins * 60) / 36) * FARE.TAXI.PER_36SEC;
            } else {
                fare = FARE.PRIVATE.BASE + (km * FARE.PRIVATE.PER_KM);
            }

            if (hour >= 0 && hour < 6) fare *= 1.5;
            const toll = km > 20 ? Math.ceil(km * 0.15) : 0;
            const finalFare = Math.ceil(fare + toll);

            updateUI(finalFare, km, mins, mode);
        }

        function updateUI(fare, km, mins, mode) {
            $("fare").innerText = `RM ${fare}`;
            $("distance").innerText = `${km.toFixed(1)} km`;
            $("eta").innerText = `${Math.round(mins)} min`;
            $("mode-badge").innerText = mode;

            const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${pickupCoord[0]},${pickupCoord[1]}&destination=${dropoffCoord[0]},${dropoffCoord[1]}&travelmode=driving`;
            $("nav-btn").href = mapsUrl;

            const msg = `*New Ride Booking*\n\nFrom: ${$("pickup").value}\nTo: ${$("dropoff").value}\n\nDist: ${km.toFixed(1)}km\nEst Time: ${Math.round(mins)}min\nFare: RM ${fare}\nMode: ${mode}\n\nNavigation: ${mapsUrl}`;
            $("wa-btn").href = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`;
        }

        function decodePoly(str) {
            let index = 0, lat = 0, lng = 0, coordinates = [];
            while (index < str.length) {
                let b, shift = 0, result = 0;
                do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lat += (result & 1) ? ~(result >> 1) : (result >> 1);
                shift = 0; result = 0;
                do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lng += (result & 1) ? ~(result >> 1) : (result >> 1);
                coordinates.push([lat / 1e5, lng / 1e5]);
            }
            return coordinates;
        }

        function loadPreset(val) {
            if (PRESETS[val]) selectLocation('dropoff', PRESETS[val].coord, PRESETS[val].name);
        }

        $("pickup").oninput = e => searchPlaces(e.target.value, "pickup-results", "pickup");
        $("dropoff").oninput = e => searchPlaces(e.target.value, "dropoff-results", "dropoff");
        $("gps-trigger").onclick = () => {
            navigator.geolocation.getCurrentPosition(p => {
                selectLocation('pickup', [p.coords.latitude, p.coords.longitude], "My Location");
                map.setView([p.coords.latitude, p.coords.longitude], 15);
            }, () => alert("GPS access denied."));
        };
    </script>
</body>
</html>
