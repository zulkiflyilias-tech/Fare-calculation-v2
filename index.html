<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rideshare MY - Expert v4.8.2</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --whatsapp: #25D366;
            --copy: #6b7280;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text: #1f2937;
            --gray-text: #6b7280;
            --pickup-blue: #3b82f6;
            --dropoff-red: #ef4444;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        .search-panel {
            background: var(--card-bg); padding: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            z-index: 1005; border-bottom: 1px solid #e5e7eb; position: relative;
        }

        .input-group { position: relative; margin-bottom: 12px; }
        .input-group label {
            display: block; font-size: 10px; font-weight: 800; margin-bottom: 4px;
            color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.05em;
        }

        .input-group.loading::after {
            content: "";
            position: absolute;
            right: 95px;
            top: 32px;
            width: 14px;
            height: 14px;
            border: 2px solid #e5e7eb;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        input {
            width: 100%; padding: 12px 90px 12px 14px;
            border: 1.5px solid #e5e7eb; border-radius: 12px;
            box-sizing: border-box; font-size: 14px; outline: none;
            background: #f9fafb; transition: all 0.2s ease;
        }
        input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }

        .btn-container { position: absolute; right: 8px; top: 24px; display: flex; gap: 4px; }
        .icon-btn {
            background: transparent; border: none; cursor: pointer; padding: 6px;
            display: flex; align-items: center; justify-content: center; border-radius: 8px;
            font-size: 18px; color: #9ca3af;
        }

        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; background: white;
            z-index: 9999; max-height: 250px; overflow-y: auto; display: none;
            border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 1px solid #e5e7eb; margin-top: 2px;
        }
        .autocomplete-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
        .autocomplete-item:hover { background: #f9fafb; }
        .loc-name { font-weight: 700; font-size: 13px; display: block; color: #111; }
        .loc-addr { font-size: 11px; color: var(--gray-text); }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        .swap-container { position: absolute; right: 24px; top: 76px; z-index: 1006; }
        .swap-btn {
            background: white; border: 1px solid #e5e7eb; border-radius: 50%;
            width: 36px; height: 36px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .results-card {
            position: fixed; bottom: 24px; left: 16px; right: 16px;
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 1002; display: none;
        }
        #fare { font-size: 34px; font-weight: 800; color: var(--primary); margin: 0; }
        .mode-badge { background:#ecfdf5; color:var(--primary); padding:6px 12px; border-radius:30px; font-size:11px; font-weight:700; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
        .btn { padding: 12px 4px; border-radius: 10px; text-align: center; text-decoration: none; font-weight: 700; font-size: 12px; color: white; border: none; cursor: pointer; }
        .btn-wa { background: var(--whatsapp); }
        .btn-nav { background: #3b82f6; }
        .btn-copy { background: var(--copy); }
        
        #loading-state { text-align: center; padding: 10px; color: var(--primary); font-weight: 600; display: none; }

        .marker-label {
            background: white; border: 2px solid black; border-radius: 50%;
            width: 24px; height: 24px; display: flex; align-items: center;
            justify-content: center; font-weight: 800; font-size: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="search-panel">
        <div class="input-group" id="pickup-group">
            <label>Pickup Location</label>
            <input type="text" id="pickup" placeholder="Search for pickup..." autocomplete="off" enterkeyhint="search">
            <div class="btn-container">
                <button class="icon-btn" id="clear-pickup" style="display:none">✕</button>
                <button class="icon-btn" id="gps-trigger">📍</button>
            </div>
            <div id="pickup-results" class="autocomplete-list"></div>
        </div>

        <div class="swap-container">
            <button class="swap-btn" id="swap-btn">⇅</button>
        </div>

        <div class="input-group" id="dropoff-group">
            <label>Destination</label>
            <input type="text" id="dropoff" placeholder="Search for destination..." autocomplete="off" enterkeyhint="search">
            <div class="btn-container">
                <button class="icon-btn" id="clear-dropoff" style="display:none">✕</button>
            </div>
            <div id="dropoff-results" class="autocomplete-list"></div>
        </div>

        <div class="input-group" style="margin-bottom: 0;">
            <label>Travel Schedule</label>
            <input type="datetime-local" id="departure-time">
        </div>
    </div>

    <div id="map"></div>

    <div id="results" class="results-card">
        <div id="loading-state">Updating...</div>
        <div id="fare-content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 id="fare">RM 0</h2>
                <span id="mode-badge" class="mode-badge">Standard Rate</span>
            </div>
            <div style="margin: 10px 0; font-size:14px; color:#4b5563;">
                📏 <b id="distance">0 km</b> | ⏱️ <b id="eta">0 min</b>
            </div>
            <div class="btn-group">
                <a id="wa-btn" class="btn btn-wa" target="_blank">WhatsApp</a>
                <button id="copy-btn" class="btn btn-copy">Copy Text</button>
                <div id="nav-btn" class="btn btn-nav">Directions</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            WHATSAPP: "60108988182",
            ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
            CENTER: [4.2105, 101.9758],
            ZOOM: 7,
            HIGH_DEMAND_KEYWORDS: [
                "mall", "pavilion", "mid valley", "klcc", "sunway", "ioio", "paradigm", "plaza",
                "airport", "klia", "klia2", "subang airport", "hotel", "resort", "tower",
                "commercial", "industrial", "city centre", "central", "sentral", "station", 
                "mrt", "lrt", "tourist", "batu caves", "genting", "bintang", "mydin"
            ]
        };

        const iconA = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="marker-label" style="border-color:var(--pickup-blue); color:var(--pickup-blue);">A</div>`,
            iconSize: [24, 24], iconAnchor: [12, 12]
        });

        const iconB = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="marker-label" style="border-color:var(--dropoff-red); color:var(--dropoff-red);">B</div>`,
            iconSize: [24, 24], iconAnchor: [12, 12]
        });

        const $ = id => document.getElementById(id);
        let pickupCoord, dropoffCoord, routeLayer, pickupMarker, dropoffMarker, searchTimer;
        let lastSummaryText = "";

        const map = L.map("map", { zoomControl: false, attributionControl: false }).setView(CONFIG.CENTER, CONFIG.ZOOM);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        $("departure-time").value = now.toISOString().slice(0,16);

        function formatDuration(totalMinutes) {
            const hrs = Math.floor(totalMinutes / 60);
            const mins = totalMinutes % 60;
            if (hrs > 0) {
                return `${hrs}h ${mins}m (${totalMinutes} min)`;
            }
            return `${totalMinutes} min`;
        }

        async function searchPlaces(query, resultId, type) {
            const list = $(resultId);
            const group = $(`${type}-group`);
            $(`clear-${type}`).style.display = query.length > 0 ? 'flex' : 'none';
            
            clearTimeout(searchTimer);
            if (query.length < 3) { list.style.display = 'none'; group.classList.remove('loading'); return; }

            group.classList.add('loading');
            searchTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&countrycode=MY&limit=6`);
                    const data = await res.json();
                    renderResults(data.features, resultId, type);
                } catch (e) { console.error(e); } finally { group.classList.remove('loading'); }
            }, 400);
        }

        function renderResults(features, resultId, type) {
            const list = $(resultId);
            if (!features.length) { list.style.display = 'none'; return; }
            list.innerHTML = features.map(f => {
                const p = f.properties;
                const name = p.name || 'Unknown Location';
                const addr = [p.street, p.district, p.city, p.state].filter(Boolean).join(', ');
                const fullStr = `${name}, ${addr}`.replace(/'/g, "\\'");
                return `<div class="autocomplete-item" onclick="selectLoc('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${fullStr}')">
                    <span class="loc-name">${name}</span>
                    <span class="loc-addr">${addr || 'Malaysia'}</span>
                </div>`;
            }).join('');
            list.style.display = 'block';
        }

        function selectLoc(type, coord, label) {
            $(type).value = label;
            $(`${type}-results`).style.display = 'none';
            $(`clear-${type}`).style.display = 'flex';
            
            if (type === 'pickup') {
                if (pickupMarker) map.removeLayer(pickupMarker);
                pickupCoord = coord;
                pickupMarker = L.marker(coord, {icon: iconA}).addTo(map);
                if (!$("dropoff").value) $("dropoff").focus();
            } else {
                if (dropoffMarker) map.removeLayer(dropoffMarker);
                dropoffCoord = coord;
                dropoffMarker = L.marker(coord, {icon: iconB}).addTo(map);
            }
            if (pickupCoord && dropoffCoord) calculate();
        }

        function resetField(type) {
            $(type).value = '';
            $(`clear-${type}`).style.display = 'none';
            $(`${type}-results`).style.display = 'none';
            if (type === 'pickup') { if (pickupMarker) map.removeLayer(pickupMarker); pickupCoord = null; }
            else { if (dropoffMarker) map.removeLayer(dropoffMarker); dropoffCoord = null; }
            if (routeLayer) map.removeLayer(routeLayer);
            $("results").style.display = 'none';
        }

        async function calculate() {
            if (!pickupCoord || !dropoffCoord) return;
            $("results").style.display = 'block';
            $("fare").style.opacity = "0.4";
            $("loading-state").style.display = 'block';

            try {
                const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                    body: JSON.stringify({ coordinates: [[pickupCoord[1], pickupCoord[0]], [dropoffCoord[1], dropoffCoord[0]]] })
                });
                const data = await res.json();
                const route = data.routes[0];
                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.polyline(decodePoly(route.geometry), { color: '#059669', weight: 6 }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [80, 80] });

                const km = route.summary.distance / 1000;
                const actualEtaTotal = Math.ceil(route.summary.duration / 60);
                const dateObj = new Date($("departure-time").value);
                const hour = dateObj.getHours();
                const locText = ($("pickup").value + $("dropoff").value).toLowerCase();

                const isHighDemand = CONFIG.HIGH_DEMAND_KEYWORDS.some(key => locText.includes(key));
                const isPeak = (hour >= 6 && hour < 9) || (hour >= 12 && hour < 14) || (hour >= 17 && hour < 21);

                let ratePerKm = 0;
                if (km >= 90) ratePerKm = isHighDemand ? 2.20 : 1.75;
                else if (isPeak) ratePerKm = isHighDemand ? 1.97 : 1.54;
                else ratePerKm = isHighDemand ? 1.30 : 1.00;

                const baselineMinutes = (km / 25) * 60;
                let trafficSurcharge = 0;
                if (actualEtaTotal > baselineMinutes) {
                    const delayMinutes = actualEtaTotal - baselineMinutes;
                    trafficSurcharge = delayMinutes * 0.20;
                }

                let finalFare = (km * ratePerKm) + trafficSurcharge;
                const roundedFare = Math.max(Math.round(finalFare), 5);

                const modeLabel = isHighDemand ? "Zone Max" : "Standard Rate";
                const trafficLabel = trafficSurcharge > 0 ? `+ RM ${trafficSurcharge.toFixed(2)} Traffic` : modeLabel;
                
                // CRITICAL UPDATE: Applying the formatting
                const durationString = formatDuration(actualEtaTotal);

                $("fare").innerText = `RM ${roundedFare}`;
                $("distance").innerText = `${km.toFixed(1)} km`;
                $("eta").innerText = durationString;
                $("mode-badge").innerText = trafficLabel;

                const formattedTime = dateObj.toLocaleString('en-MY', { 
                    weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' 
                });

                lastSummaryText = `🚖 *NEW RIDE BOOKING*\n--------------------------\n📍 *Pickup:* ${$("pickup").value}\n🏁 *Drop-off:* ${$("dropoff").value}\n⏰ *Time:* ${formattedTime}\n\n📊 *Details:*\n• Distance: ${km.toFixed(1)} km\n• Duration: ${durationString}\n• Traffic Adj: RM ${trafficSurcharge.toFixed(2)}\n\n💰 *TOTAL FARE: RM ${roundedFare}*\n--------------------------`;
                
                $("wa-btn").href = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(lastSummaryText)}`;
                $("nav-btn").onclick = () => window.location.href = `google.navigation:q=${dropoffCoord[0]},${dropoffCoord[1]}`;
                $("fare").style.opacity = "1";
                $("loading-state").style.display = 'none';
            } catch (e) { 
                console.error(e);
                $("loading-state").innerText = "Calculation error."; 
            }
        }

        function decodePoly(str) {
            let index = 0, lat = 0, lng = 0, coordinates = [];
            while (index < str.length) {
                let b, shift = 0, result = 0;
                do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lat += (result & 1) ? ~(result >> 1) : (result >> 1);
                shift = 0; result = 0;
                do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
                lng += (result & 1) ? ~(result >> 1) : (result >> 1);
                coordinates.push([lat / 1e5, lng / 1e5]);
            }
            return coordinates;
        }

        $("pickup").oninput = e => searchPlaces(e.target.value, "pickup-results", "pickup");
        $("dropoff").oninput = e => searchPlaces(e.target.value, "dropoff-results", "dropoff");
        $("departure-time").onchange = () => { if (pickupCoord && dropoffCoord) calculate(); };
        $("clear-pickup").onclick = () => resetField('pickup');
        $("clear-dropoff").onclick = () => resetField('dropoff');

        $("gps-trigger").onclick = () => {
            navigator.geolocation.getCurrentPosition(async p => {
                const lat = p.coords.latitude, lon = p.coords.longitude;
                try {
                    const res = await fetch(`https://photon.komoot.io/reverse?lon=${lon}&lat=${lat}`);
                    const data = await res.json();
                    const feat = data.features[0].properties;
                    const addr = [feat.name, feat.street, feat.district, feat.city].filter(Boolean).join(', ');
                    selectLoc('pickup', [lat, lon], addr || "Current Location");
                } catch (e) { selectLoc('pickup', [lat, lon], "Current Location"); }
            }, (err) => alert("GPS Error: " + err.message));
        };

        $("swap-btn").onclick = () => {
            const v1 = $("pickup").value, v2 = $("dropoff").value;
            const c1 = pickupCoord, c2 = dropoffCoord;
            if(!c1 || !c2) return;
            $("pickup").value = v2; $("dropoff").value = v1;
            pickupCoord = c2; dropoffCoord = c1;
            if (pickupMarker) map.removeLayer(pickupMarker);
            if (dropoffMarker) map.removeLayer(dropoffMarker);
            pickupMarker = L.marker(pickupCoord, {icon: iconA}).addTo(map);
            dropoffMarker = L.marker(dropoffCoord, {icon: iconB}).addTo(map);
            if (pickupCoord && dropoffCoord) calculate();
        };

        $("copy-btn").onclick = () => {
            navigator.clipboard.writeText(lastSummaryText.replace(/\*/g, '')).then(() => {
                const btn = $("copy-btn"); btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy Text", 2000);
            });
        };

        map.on('click', () => { 
            $("pickup-results").style.display = 'none'; 
            $("dropoff-results").style.display = 'none'; 
        });
    </script>
</body>
</html>
