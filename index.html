<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rideshare Pro | West Malaysia</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --primary: #059669; 
            --bg: #f1f5f9; 
            --whatsapp: #128C7E; 
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            margin: 0; display: flex; height: 100dvh;
            background: var(--bg); color: #0f172a; overflow: hidden;
        }
        
        #sidebar { 
            width: 400px; background: var(--card-bg); padding: 32px; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.05); z-index: 1000; 
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
        }
        
        #map { flex-grow: 1; z-index: 1; }

        .header { margin-bottom: 28px; }
        h2 { margin: 0; font-size: 1.6rem; letter-spacing: -0.025em; }
        .status-badge { 
            display: inline-block; padding: 4px 12px; border-radius: 20px; 
            background: #e2e8f0; color: #475569; font-size: 0.7rem; font-weight: 700; margin-top: 8px;
        }

        .input-group { margin-bottom: 20px; position: relative; }
        label { display: flex; justify-content: space-between; font-weight: 600; margin-bottom: 8px; font-size: 0.75rem; color: #64748b; }
        
        .locate-btn { color: #6366f1; cursor: pointer; font-size: 0.75rem; border: 1px solid #e2e8f0; padding: 2px 8px; border-radius: 6px; }

        input { 
            width: 100%; padding: 14px; border: 1px solid #e2e8f0; 
            border-radius: 12px; font-size: 15px; box-sizing: border-box; transition: all 0.2s;
            background: white;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }

        .autocomplete-results {
            position: absolute; width: 100%; background: white; border-radius: 12px;
            max-height: 240px; overflow-y: auto; z-index: 2000; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-top: 5px;
        }
        .autocomplete-item { padding: 14px; cursor: pointer; font-size: 0.9em; border-bottom: 1px solid #f1f5f9; }
        .autocomplete-item:hover { background: #f8fafc; }

        #results { 
            margin-top: auto; padding: 24px; background: white; 
            border-radius: 20px; display: none; border: 1px solid #e2e8f0;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .btn-whatsapp {
            display: block; width: 100%; padding: 16px; background: var(--whatsapp); color: white;
            text-align: center; text-decoration: none; border-radius: 12px; font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-whatsapp:active { transform: scale(0.98); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: auto; max-height: 50%; padding: 20px; order: 2; }
            #map { height: 50%; order: 1; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <h2>Rideshare MY</h2>
        <div id="traffic-status" class="status-badge">Peninsular Malaysia Only</div>
    </div>

    <div class="input-group">
        <label>Pickup Location <span class="locate-btn" onclick="getLocation()">📍 Use GPS</span></label>
        <input type="text" id="pickup" placeholder="Enter pickup point" autocomplete="off">
        <div id="pickup-results" class="autocomplete-results"></div>
    </div>

    <div class="input-group">
        <label>Dropoff Destination</label>
        <input type="text" id="dropoff" placeholder="Where to?" autocomplete="off">
        <div id="dropoff-results" class="autocomplete-results"></div>
    </div>

    <div id="results">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div>
                <div id="res-fare" style="font-size: 2rem; font-weight: 800; color: #0f172a;">RM 0</div>
                <div id="res-distance" style="color: #64748b; font-size: 0.9rem;">0 km total</div>
            </div>
            <div style="text-align: right;">
                <div id="res-eta" style="font-size: 1.2rem; font-weight: 700; color: var(--primary);">--</div>
                <div style="font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700;">Est. Travel Time</div>
            </div>
        </div>
        <a href="#" id="whatsapp-link" class="btn-whatsapp" target="_blank">Book Ride via WhatsApp</a>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const CONFIG = { 
        WHATSAPP_NUM: "60108988182", 
        CENTER: [3.139, 101.686],
        // Strictly West Malaysia (Peninsular) Bounding Box: [minLon, minLat, maxLon, maxLat]
        BBOX: "99.6,1.2,103.5,6.7" 
    };

    let map = L.map('map', { zoomControl: false }).setView(CONFIG.CENTER, 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    let pickupCoord, dropoffCoord, pickupMarker, dropoffMarker, routeLine;
    let searchTimeout;

    function getTrafficContext() {
        const hour = new Date().getHours();
        const day = new Date().getDay(); 
        const isWeekend = (day === 0 || day === 6);

        if (hour >= 7 && hour <= 9 && !isWeekend) return { buffer: 1.5 }; 
        if (hour >= 17 && hour <= 20 && !isWeekend) return { buffer: 1.6 }; 
        return { buffer: 1.15 }; 
    }

    map.on('click', async (e) => {
        const name = await reverseGeocode(e.latlng.lat, e.latlng.lng);
        if (!pickupCoord) setPickup([e.latlng.lat, e.latlng.lng], name);
        else setDropoff([e.latlng.lat, e.latlng.lng], name);
    });

    async function reverseGeocode(lat, lng) {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const d = await r.json();
            return d.name || d.address.road || "Selected Location";
        } catch (e) { return "Selected Location"; }
    }

    function setPickup(coords, name) {
        pickupCoord = coords;
        document.getElementById('pickup').value = name;
        if (pickupMarker) map.removeLayer(pickupMarker);
        pickupMarker = L.circleMarker(coords, {radius: 8, color: '#059669', fillOpacity: 1}).addTo(map);
        checkAndRoute();
    }

    function setDropoff(coords, name) {
        dropoffCoord = coords;
        document.getElementById('dropoff').value = name;
        if (dropoffMarker) map.removeLayer(dropoffMarker);
        dropoffMarker = L.circleMarker(coords, {radius: 8, color: '#ef4444', fillOpacity: 1}).addTo(map);
        checkAndRoute();
    }

    async function checkAndRoute() {
        if (!pickupCoord || !dropoffCoord) return;
        
        const url = `https://router.project-osrm.org/route/v1/driving/${pickupCoord[1]},${pickupCoord[0]};${dropoffCoord[1]},${dropoffCoord[0]}?overview=full&geometries=geojson`;
        const r = await fetch(url);
        const d = await r.json();
        
        if (d.routes && d.routes.length > 0) {
            const route = d.routes[0];
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.geoJSON(route.geometry, {style: {color: '#059669', weight: 4, opacity: 0.8}}).addTo(map);
            map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
            
            calculateFare(route.distance / 1000, route.duration / 60);
        }
    }

    function calculateFare(km, baseMins) {
        const traffic = getTrafficContext();
        
        const SETTINGS = {
            BASE_START: 5.00,
            PER_KM: 1.25,
            PER_MINUTE: 0.30,
            MINIMUM_FARE: 8.00
        };

        const lightDelay = km < 4 ? 2 : 4; 
        const totalMinutes = Math.round((baseMins * traffic.buffer) + lightDelay);
        
        const hours = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;
        const timeDisplay = hours > 0 ? `${hours}h ${mins}m` : `${mins}m`;
        
        let finalFare = SETTINGS.BASE_START + (km * SETTINGS.PER_KM) + (totalMinutes * SETTINGS.PER_MINUTE);

        if (finalFare < SETTINGS.MINIMUM_FARE) {
            finalFare = SETTINGS.MINIMUM_FARE;
        }

        finalFare = Math.ceil(finalFare);

        document.getElementById('results').style.display = 'block';
        document.getElementById('res-fare').innerText = `RM ${finalFare}`;
        document.getElementById('res-distance').innerText = `${km.toFixed(1)} km trip`;
        document.getElementById('res-eta').innerText = timeDisplay;

        // --- UPDATED WHATSAPP MESSAGE (Includes Distance) ---
        const msg = `*Rideshare Booking Request*\n\n` +
                    `*From:* ${document.getElementById('pickup').value}\n` +
                    `*To:* ${document.getElementById('dropoff').value}\n\n` +
                    `*Distance:* ${km.toFixed(2)} km\n` +
                    `*⏱ Est. Time:* ${timeDisplay}\n` +
                    `*Fare:* RM ${finalFare}`;

        document.getElementById('whatsapp-link').href = `https://wa.me/${CONFIG.WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`;
    }

    const search = (val, resId, type) => {
        clearTimeout(searchTimeout);
        if (val.length < 3) return;
        searchTimeout = setTimeout(async () => {
            // Apply West Malaysia bounding box to the search API
            const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(val)}&limit=5&bbox=${CONFIG.BBOX}`;
            const r = await fetch(url);
            const d = await r.json();
            const el = document.getElementById(resId);
            el.innerHTML = d.features.map(f => {
                const name = f.properties.name || "Unknown";
                const city = f.properties.city ? `, ${f.properties.city}` : "";
                return `<div class="autocomplete-item" onclick="select('${type}', [${f.geometry.coordinates[1]},${f.geometry.coordinates[0]}], '${name.replace(/'/g, "\\'")}')"><strong>${name}</strong><br><small>${city}</small></div>`;
            }).join('');
            el.style.display = 'block';
        }, 400);
    };

    window.select = (type, coords, name) => {
        if (type === 'pickup') { setPickup(coords, name); }
        else { setDropoff(coords, name); }
        document.querySelectorAll('.autocomplete-results').forEach(i => i.style.display = 'none');
    };

    document.getElementById('pickup').oninput = (e) => search(e.target.value, 'pickup-results', 'pickup');
    document.getElementById('dropoff').oninput = (e) => search(e.target.value, 'dropoff-results', 'dropoff');

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const name = await reverseGeocode(pos.coords.latitude, pos.coords.longitude);
                setPickup([pos.coords.latitude, pos.coords.longitude], name);
                map.setView([pos.coords.latitude, pos.coords.longitude], 15);
            });
        }
    }
</script>
</body>
</html>
