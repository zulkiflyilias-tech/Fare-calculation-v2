    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            WHATSAPP: "60108988182",
            ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
            CENTER: [3.139, 101.686],
            LIMITS: { minLat: 1.2, maxLat: 6.8, minLng: 99.5, maxLng: 104.8 }
        };
        const FARE = { BASE: 3.0, T1_KM: 1.25, T1_MIN: 0.43, T2_KM: 1.80, LIMIT: 50 };
        const $ = id => document.getElementById(id);
        let pCoord, dCoord, routeL, pMarker, dMarker, sTimer;

        const map = L.map("map", { zoomControl: false }).setView(CONFIG.CENTER, 13);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        window.onload = () => {
            const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            $("departure-time").value = now.toISOString().slice(0, 16);
        };

        const isWM = c => c[0] >= CONFIG.LIMITS.minLat && c[0] <= CONFIG.LIMITS.maxLat && c[1] >= CONFIG.LIMITS.minLng && c[1] <= CONFIG.LIMITS.maxLng;

        async function searchPlaces(q, resId, type) {
            clearTimeout(sTimer);
            if (q.length < 3) return $(resId).style.display = 'none';
            sTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&bbox=99.5,1.2,104.8,6.8&limit=6`);
                    const data = await res.json();
                    $(resId).innerHTML = data.features.map(f => {
                        const p = f.properties;
                        const header = p.name || p.street || "Unknown Location";
                        // Build a cleaner full address string
                        const addressParts = [p.street, p.district, p.city, p.state].filter(Boolean);
                        const sub = addressParts.join(", ");
                        const full = p.name && !sub.includes(p.name) ? `${p.name}, ${sub}` : sub;
                        
                        return `<div class="autocomplete-item" onclick="selectLoc('${type}',[${f.geometry.coordinates[1]},${f.geometry.coordinates[0]}],'${full.replace(/'/g,"\\'")}')">
                            <strong style="display:block;font-size:14px;">${header}</strong>
                            <small style="color:#6b7280;">${sub}</small>
                        </div>`;
                    }).join('');
                    $(resId).style.display = data.features.length ? 'block' : 'none';
                } catch (e) { console.error(e); }
            }, 400);
        }

        function selectLoc(type, c, label) {
            if (!isWM(c)) return alert("Service limited to Peninsular Malaysia.");
            $(type).value = label; 
            $(`${type}-results`).style.display = 'none';
            
            if (type === 'pickup') { 
                pCoord = c; 
                if (pMarker) map.removeLayer(pMarker); 
                pMarker = L.marker(c).addTo(map); 
            } else { 
                dCoord = c; 
                if (dMarker) map.removeLayer(dMarker); 
                dMarker = L.marker(c).addTo(map); 
            }
            
            if (pCoord && dCoord) calcRoute();
            else map.setView(c, 15);
        }

        async function calcRoute() {
            toggleRes(true, true);
            try {
                const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                    method: "POST", 
                    headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                    body: JSON.stringify({ coordinates: [[pCoord[1], pCoord[0]], [dCoord[1], dCoord[0]]] })
                });
                const data = await res.json();
                const r = data.routes[0];
                if (routeL) map.removeLayer(routeL);
                routeL = L.polyline(decodePoly(r.geometry), { color: '#059669', weight: 5 }).addTo(map);
                map.fitBounds(routeL.getBounds(), { padding: [50, 50] });

                const km = r.summary.distance / 1000;
                const baseMins = r.summary.duration / 60;
                const isPeak = [7,8,9,17,18,19,20].includes(new Date($("departure-time").value).getHours());
                const mins = baseMins * (isPeak ? 1.4 : 1.1);
                
                processFare(km, mins);
                toggleRes(true, false);
            } catch (e) { 
                alert("Route calculation failed. Please try a different location."); 
                toggleRes(false); 
            }
        }

        function processFare(km, mins) {
            const hr = new Date($("departure-time").value).getHours();
            let f = FARE.BASE;
            if (km <= FARE.LIMIT) {
                f += (km * FARE.T1_KM) + (mins * FARE.T1_MIN);
            } else {
                f += (FARE.LIMIT * FARE.T1_KM) + ((FARE.LIMIT * (mins/km)) * FARE.T1_MIN) + ((km - FARE.LIMIT) * FARE.T2_KM);
            }
            if (hr >= 0 && hr < 6) f *= 1.5; // Night Surcharge
            
            const final = Math.ceil(f);
            $("fare").innerText = `RM ${final}`; 
            $("distance").innerText = `${km.toFixed(1)} km`; 
            $("eta").innerText = `${Math.round(mins)} min`;
            $("mode-badge").innerText = km > FARE.LIMIT ? "Outstation" : "Standard";
            
            const nav = `https://www.google.com/maps/dir/?api=1&origin=${pCoord[0]},${pCoord[1]}&destination=${dCoord[0]},${dCoord[1]}&travelmode=driving`;
            $("nav-btn").href = nav;
            $("wa-btn").href = `https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(`*New Booking Request*\n\n📍 From: ${$("pickup").value}\n🏁 To: ${$("dropoff").value}\n\n💰 Fare: RM ${final}\n📏 Dist: ${km.toFixed(1)}km\n⏱️ Est: ${Math.round(mins)}min\n\n🗺️ Route: ${nav}`)}`;
        }

        function toggleRes(show, loading = false) {
            $("results").style.display = show ? 'block' : 'none';
            $("loading-state").style.display = loading ? 'block' : 'none';
            $("fare-content").style.display = (!loading && show) ? 'block' : 'none';
        }

        function decodePoly(s) {
            let i=0, lt=0, ln=0, coords=[];
            while(i<s.length){
                let b, sh=0, res=0;
                do { b=s.charCodeAt(i++)-63; res|=(b&0x1f)<<sh; sh+=5; } while(b>=0x20);
                lt += (res&1?~(res>>1):res>>1); sh=0; res=0;
                do { b=s.charCodeAt(i++)-63; res|=(b&0x1f)<<sh; sh+=5; } while(b>=0x20);
                ln += (res&1?~(res>>1):res>>1); coords.push([lt/1e5, ln/1e5]);
            } return coords;
        }

        $("pickup").oninput = e => searchPlaces(e.target.value, "pickup-results", "pickup");
        $("dropoff").oninput = e => searchPlaces(e.target.value, "dropoff-results", "dropoff");
        
        $("gps-trigger").onclick = () => {
            $("pickup").placeholder = "Locating...";
            navigator.geolocation.getCurrentPosition(async (p) => {
                const lat = p.coords.latitude;
                const lon = p.coords.longitude;
                try {
                    const res = await fetch(`https://photon.komoot.io/reverse?lon=${lon}&lat=${lat}`);
                    const data = await res.json();
                    const feat = data.features[0].properties;
                    const header = feat.name || feat.street || "My Location";
                    const city = feat.city || feat.town || "";
                    const full = [header, city].filter(Boolean).join(", ");
                    selectLoc('pickup', [lat, lon], full);
                } catch (e) {
                    selectLoc('pickup', [lat, lon], "Current Location");
                }
            }, () => {
                alert("Please enable location services.");
                $("pickup").placeholder = "Search pickup...";
            });
        };
    </script>
