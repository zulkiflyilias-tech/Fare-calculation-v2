<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rideshare MY - Pro v3.9.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #059669; --whatsapp: #25D366; --bg: #f3f4f6; --text: #1f2937; --gray: #6b7280; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .search-panel { background: #fff; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 100; border-bottom: 1px solid #e5e7eb; }
        .input-group { position: relative; margin-bottom: 12px; }
        .input-group label { display: block; font-size: 10px; font-weight: 800; margin-bottom: 4px; color: var(--gray); text-transform: uppercase; }
        
        input { width: 100%; padding: 14px 90px 14px 14px; border: 1.5px solid #e5e7eb; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; background: #f9fafb; }
        input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1); }
        
        .btn-container { position: absolute; right: 8px; top: 24px; display: flex; }
        .icon-btn { background: transparent; border: none; cursor: pointer; padding: 10px; color: var(--gray); }
        
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; z-index: 200; max-height: 250px; overflow-y: auto; display: none; border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .autocomplete-item { padding: 14px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
        .loc-name { font-weight: 600; font-size: 14px; display: block; }
        .loc-addr { font-size: 11px; color: var(--gray); }

        #map { flex-grow: 1; z-index: 1; }
        .swap-container { position: absolute; right: 24px; top: 76px; z-index: 105; }
        .swap-btn { background: #fff; border: 1px solid #e5e7eb; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; color: var(--primary); }

        .results-card { position: fixed; bottom: 24px; left: 16px; right: 16px; background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.15); z-index: 300; display: none; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        #fare { font-size: 32px; font-weight: 800; color: var(--primary); margin: 0; }
        .mode-badge { background:#ecfdf5; color:var(--primary); padding:4px 12px; border-radius:20px; font-size:10px; font-weight:700; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .btn { padding: 14px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 700; font-size: 14px; color: #fff; display: flex; align-items: center; justify-content: center; }
        .btn-wa { background: var(--whatsapp); }
        .btn-nav { background: #3b82f6; }

        .loader { width: 20px; height: 20px; border: 3px solid #ecfdf5; border-bottom-color: var(--primary); border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="search-panel">
        <div class="input-group">
            <label>Pickup Location</label>
            <input type="text" id="pickup" placeholder="Search pickup..." autocomplete="off">
            <div class="btn-container">
                <button class="icon-btn" onclick="clearInput('pickup')">✕</button>
                <button class="icon-btn" id="gps-trigger">📍</button>
            </div>
            <div id="pickup-results" class="autocomplete-list"></div>
        </div>

        <div class="swap-container"><button class="swap-btn" id="swap-btn">⇅</button></div>

        <div class="input-group">
            <label>Destination</label>
            <input type="text" id="dropoff" placeholder="Search destination..." autocomplete="off">
            <div class="btn-container"><button class="icon-btn" onclick="clearInput('dropoff')">✕</button></div>
            <div id="dropoff-results" class="autocomplete-list"></div>
        </div>

        <div class="input-group" style="margin:0"><label>Schedule</label><input type="datetime-local" id="departure-time"></div>
    </div>

    <div id="map"></div>

    <div id="results" class="results-card">
        <div id="loading-state" style="text-align:center"><span class="loader"></span><p>Calculating...</p></div>
        <div id="fare-content" style="display:none">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <h2 id="fare">RM 8</h2>
                <span id="mode-badge" class="mode-badge">Standard</span>
            </div>
            <div style="display:flex; gap:15px; font-size:13px; color: var(--gray); background: #f9fafb; padding: 10px; border-radius: 10px;">
                <span>📏 <b><span id="distance">0 km</span></b></span>
                <span>⏱️ <b><span id="eta">0 min</span></b></span>
            </div>
            <div class="btn-group">
                <a id="wa-btn" class="btn btn-wa" target="_blank">WhatsApp</a>
                <a id="nav-btn" class="btn btn-nav" target="_blank">Navigate</a>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const CONFIG = {
            WHATSAPP: "60108988182",
            ORS_KEY: "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImVlYzI5ZTA0OTM2YTRlZDNhNjk1NTcyNGQ1OTJmYmNjIiwiaCI6Im11cm11cjY0In0=",
            CENTER: [3.139, 101.686]
        };

        const $ = id => document.getElementById(id);
        let coords = { pickup: null, dropoff: null };
        let markers = { pickup: null, dropoff: null };
        let routeLayer, searchTimer;

        const map = L.map("map", { zoomControl: false, attributionControl: false }).setView(CONFIG.CENTER, 13);
        L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png").addTo(map);

        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        $("departure-time").value = now.toISOString().slice(0,16);

        function clearInput(type) {
            $(type).value = "";
            coords[type] = null;
            if (markers[type]) map.removeLayer(markers[type]);
            $(`${type}-results`).style.display = 'none';
        }

        async function search(query, type) {
            if (query.length < 3) return $(`${type}-results`).style.display = 'none';
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                const c = map.getCenter();
                const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query + " Malaysia")}&lat=${c.lat}&lon=${c.lng}&limit=5`);
                const data = await res.json();
                renderResults(data.features, type);
            }, 400);
        }

        function renderResults(features, type) {
            const list = $(`${type}-results`);
            list.innerHTML = features.map(f => {
                const p = f.properties;
                const label = `${p.name || 'Location'}, ${p.city || p.state || ''}`.replace(/'/g, "\\'");
                return `<div class="autocomplete-item" onclick="select('${type}', [${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], '${label}')">
                    <span class="loc-name">${p.name}</span><span class="loc-addr">${p.city || ''} ${p.state || ''}</span>
                </div>`;
            }).join('');
            list.style.display = features.length ? 'block' : 'none';
        }

        function select(type, latlng, label) {
            $(type).value = label;
            $(`${type}-results`).style.display = 'none';
            coords[type] = latlng;
            if (markers[type]) map.removeLayer(markers[type]);
            markers[type] = L.circleMarker(latlng, {color: type === 'pickup' ? '#3b82f6' : '#ef4444', fillOpacity: 1, radius: 7}).addTo(map);
            
            if (coords.pickup && coords.dropoff) calculate();
            else map.setView(latlng, 15);
        }

        async function calculate() {
            $("results").style.display = 'block';
            $("fare-content").style.display = 'none';
            $("loading-state").style.display = 'block';

            try {
                const res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": CONFIG.ORS_KEY },
                    body: JSON.stringify({ coordinates: [[coords.pickup[1], coords.pickup[0]], [coords.dropoff[1], coords.dropoff[0]]] })
                });
                const data = await res.json();
                const route = data.routes[0];
                const polyCoords = route.geometry.coordinates.map(c => [c[1], c[0]]);

                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.polyline(polyCoords, { color: '#059669', weight: 5 }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [40, 40] });

                const km = route.summary.distance / 1000;
                const hr = new Date($("departure-time").value).getHours();
                
                // Optimized Fare Calculation (RM 8 Min, Whole Numbers)
                let rate = 1.30;
                let mode = "Standard";
                if (hr < 6 || hr > 22) { rate = 1.95; mode = "Night"; }
                else if ((hr > 6 && hr < 9) || (hr > 16 && hr < 20)) { rate = 1.60; mode = "Peak"; }

                const total = Math.max(8, Math.ceil(8 + (km * rate)));

                $("fare").innerText = `RM ${total}`;
                $("distance").innerText = `${km.toFixed(1)} km`;
                $("eta").innerText = `${Math.round(route.summary.duration / 60)} min`;
                $("mode-badge").innerText = mode;
                
                const msg = encodeURIComponent(`*New Booking*\nFrom: ${$("pickup").value}\nTo: ${$("dropoff").value}\nFare: RM ${total}\nDist: ${km.toFixed(1)}km`);
                $("wa-btn").href = `https://wa.me/${CONFIG.WHATSAPP}?text=${msg}`;
                
                // FINAL CODE OPTIMIZATION: App-First Navigation Intent
                $("nav-btn").href = `https://www.google.com/maps/dir/?api=1&origin=${coords.pickup[0]},${coords.pickup[1]}&destination=${coords.dropoff[0]},${coords.dropoff[1]}&travelmode=driving`;

                $("loading-state").style.display = 'none';
                $("fare-content").style.display = 'block';
            } catch (e) { $("loading-state").innerHTML = "Calculation Error"; }
        }

        $("pickup").oninput = e => search(e.target.value, 'pickup');
        $("dropoff").oninput = e => search(e.target.value, 'dropoff');
        $("swap-btn").onclick = () => {
            const tempVal = $("pickup").value, tempCoord = coords.pickup;
            $("pickup").value = $("dropoff").value; coords.pickup = coords.dropoff;
            $("dropoff").value = tempVal; coords.dropoff = tempCoord;
            const p = markers.pickup, d = markers.dropoff;
            markers.pickup = d; markers.dropoff = p;
            if (coords.pickup && coords.dropoff) calculate();
        };
        $("gps-trigger").onclick = () => navigator.geolocation.getCurrentPosition(p => select('pickup', [p.coords.latitude, p.coords.longitude], "Current Location"));
        document.addEventListener('click', e => { if (!e.target.closest('.input-group')) document.querySelectorAll('.autocomplete-list').forEach(l => l.style.display = 'none'); });
    </script>
</body>
</html>
